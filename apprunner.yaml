version: 1.0
runtime: nodejs22

build:
  commands:
    build:
      - npm ci
      - npm --prefix mcp-adapter ci

run:
  command: npm run apprunner:mcp
  network:
    port: 3333
  env:
    - name: TOOL_RUNNER_BASE_URL
      value: "http://localhost:3002"
    - name: MCP_ADAPTER_PORT
      value: "3333"
    - name: AGENT_BYPASS
      value: "0"
  secrets:
    - name: OPENROUTER_API_KEY
      value-from: arn:aws:secretsmanager:ap-southeast-2:203918873638:secret:openrouter-api-key-plaintext-04c1U0
